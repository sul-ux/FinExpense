<header *ngIf="showNavbar"
  class="bg-[#F8FAFC] dark:bg-slate-950 text-[#0F172A] dark:text-slate-100 font-['Public_Sans'] antialiased border-b border-[#E2E8F0] dark:border-slate-800 flex justify-between items-center w-full px-6 py-3 sticky top-0 z-50">
  <div class="flex items-center gap-4">
    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
      <span class="material-symbols-outlined text-white">account_balance_wallet</span>
    </div>
    <span class="text-xl font-bold tracking-tight">FinControl</span>
  </div>

  <nav class="hidden md:flex items-center bg-slate-100 dark:bg-slate-900 p-1 rounded-xl">
    <a routerLink="/dashboard" routerLinkActive="bg-white dark:bg-slate-800 shadow-sm text-primary"
      class="px-6 py-2 rounded-lg text-sm font-semibold transition-all hover:text-primary">Dashboard</a>
    <a routerLink="/transactions" routerLinkActive="bg-white dark:bg-slate-800 shadow-sm text-primary"
      class="px-6 py-2 rounded-lg text-sm font-semibold transition-all hover:text-primary">Transactions</a>
    <a routerLink="/reports" routerLinkActive="bg-white dark:bg-slate-800 shadow-sm text-primary"
      class="px-6 py-2 rounded-lg text-sm font-semibold transition-all hover:text-primary">Reports</a>
    <a routerLink="/wallet" routerLinkActive="bg-white dark:bg-slate-800 shadow-sm text-primary"
      class="px-6 py-2 rounded-lg text-sm font-semibold transition-all hover:text-primary">Wallets</a>
  </nav>

  <div class="flex items-center gap-3">
    <button
      class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center transition-colors">
      <span class="material-symbols-outlined text-slate-500">notifications</span>
    </button>
    <div class="group relative">
      <div
        class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center border-2 border-white dark:border-slate-900 overflow-hidden cursor-pointer">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
      </div>
      <!-- Dropdown -->
      <div
        class="absolute right-0 mt-2 w-48 bg-white border rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[60]">
        <div class="p-2">
          <button (click)="logout()"
            class="w-full flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-[18px]">logout</span>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<main [ngClass]="{'pb-8 md:pb-8': showNavbar}">
  <router-outlet></router-outlet>
</main>

<!-- BottomNav Mobile -->
<nav *ngIf="showNavbar"
  class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-white border-t shadow-lg">
  <a routerLink="/dashboard" routerLinkActive="text-primary"
    class="flex flex-col items-center justify-center text-slate-400">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[10px]">Dashboard</span>
  </a>
  <a routerLink="/transactions" routerLinkActive="text-primary"
    class="flex flex-col items-center justify-center text-slate-400">
    <span class="material-symbols-outlined">payments</span>
    <span class="text-[10px]">Transactions</span>
  </a>
  <a routerLink="/reports" routerLinkActive="text-primary"
    class="flex flex-col items-center justify-center text-slate-400">
    <span class="material-symbols-outlined">analytics</span>
    <span class="text-[10px]">Reports</span>
  </a>
  <a routerLink="/wallet" routerLinkActive="text-primary"
    class="flex flex-col items-center justify-center text-slate-400">
    <span class="material-symbols-outlined">account_balance_wallet</span>
    <span class="text-[10px]">Wallets</span>
  </a>
</nav>
