<header class="bg-slate-50 border-b border-slate-200 sticky top-0 z-50">
  <div class="flex items-center justify-between px-4 h-16 w-full max-w-7xl mx-auto">
    <div class="flex items-center gap-4">
      <button routerLink="/wallet" class="hover:bg-slate-100 transition-colors p-2 rounded-full active:opacity-70">
        <span class="material-symbols-outlined text-slate-900">arrow_back</span>
      </button>
      <h1 class="font-public-sans font-semibold text-lg tracking-tight text-slate-900">Connect Account</h1>
    </div>
    <button (click)="logout()" class="text-sm font-medium text-slate-500 hover:text-red-600 transition-colors flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">logout</span>
      Logout
    </button>
  </div>
</header>
<main class="flex min-h-[calc(100vh-64px)] items-center justify-center p-gutter">
  <div class="w-full max-w-lg">
    <!-- Illustration / Icon Section -->
    <div class="mb-xl flex flex-col items-center text-center">
      <div class="w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center mb-md">
        <span class="material-symbols-outlined text-on-secondary-container text-4xl">account_balance</span>
      </div>
      <h2 class="font-display-sm text-display-sm text-on-surface mb-xs">Connect Your Account</h2>
      <p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">Enter your bank details to start tracking your finances.</p>
    </div>
    <!-- Onboarding Card -->
    <div class="bg-surface-container-lowest border border-outline-variant p-lg rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
      <form class="space-y-lg" (ngSubmit)="onSubmit()">
        <!-- Bank Name Input -->
        <div class="space-y-xs">
          <label class="font-label-md text-label-md text-on-surface" for="bank_name">
            Bank Name <span class="text-red-500">*</span>
          </label>
          <div class="relative group">
            <input class="w-full h-12 px-md font-body-md border border-outline-variant rounded-lg focus:ring-0 focus:border-primary transition-all outline-none bg-surface-bright" 
              id="bank_name" name="bank_name" [(ngModel)]="bankName" placeholder="e.g. Chase Bank" type="text" required/>
          </div>
        </div>
        <!-- Last 4 Digits Input -->
        <div class="space-y-xs">
          <label class="font-label-md text-label-md text-on-surface" for="account_last_four">
            Last 4 Digits of Account Number <span class="text-red-500">*</span>
          </label>
          <div class="relative flex items-center">
            <div class="absolute left-md flex items-center gap-xs pointer-events-none text-outline">
              <span class="material-symbols-outlined text-[18px]">lock</span>
              <span class="font-numeric-data">•••• •••• ••••</span>
            </div>
            <input class="w-full h-12 pl-[140px] pr-md font-numeric-data border border-outline-variant rounded-lg focus:ring-0 focus:border-primary transition-all outline-none bg-surface-bright placeholder:text-outline-variant" 
              id="account_last_four" maxlength="4" name="account_last_four" [(ngModel)]="accountLastFour" placeholder="1234" type="text" required/>
          </div>
        </div>
        <!-- Information Disclosure -->
        <div class="flex gap-md p-md bg-surface-container-low rounded-lg border border-outline-variant/30">
          <span class="material-symbols-outlined text-on-secondary-container">verified_user</span>
          <p class="font-label-sm text-label-sm text-on-surface-variant">
            Your financial security is our priority. We use 256-bit encryption to protect your account details.
          </p>
        </div>
        <!-- CTA Button -->
        <button class="w-full h-14 bg-primary text-on-primary font-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-sm" type="submit">
          <span>Add Account</span>
          <span class="material-symbols-outlined text-[20px]">chevron_right</span>
        </button>
      </form>
    </div>
  </div>
</main>
